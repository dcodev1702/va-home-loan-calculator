version: 2
updates:
  # Watch the Docker base images pinned by digest in the Dockerfile — both the
  # build base (node:24-bookworm-slim) and the distroless runtime base
  # (gcr.io/distroless/nodejs24-debian12). When either upstream tag resolves to a
  # new digest, Dependabot opens a PR bumping the `FROM ...@sha256:` line so the
  # update is reviewed and CI-gated rather than pulled blindly.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
    commit-message:
      prefix: "build"
    labels:
      - "dependencies"
      - "docker"
    open-pull-requests-limit: 5
