services:
  sentinel-va:
    build: .
    # The distroless runtime image runs as the built-in nonroot user (uid 65532).
    # The bind-mounted ./data must be writable by that uid: `sudo chown -R 65532:65532 ./data`.
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "3000:3000"
    volumes:
      # Persist saved scenarios on the host between runs.
      - ./data:/app/data
    restart: unless-stopped
